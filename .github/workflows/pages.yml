name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/presentation/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download playback data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download data-v1 \
            --repo damsleth/snv-trafikk \
            --pattern "*.json" \
            --dir web/presentation/data/playback/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/presentation
      - id: deployment
        uses: actions/deploy-pages@v4
