name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy scripts tests

      - name: Run fast tests
        run: uv run pytest -m "not slow and not sumo"

  presentation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/presentation/package-lock.json

      - name: Install presentation dependencies
        working-directory: web/presentation
        run: npm ci

      - name: Run presentation tests
        working-directory: web/presentation
        run: npm test
